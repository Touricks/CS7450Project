  - id: cand-2026-04-10-d3-react-dom-ownership
    type: rule
    text: React owns all SVG rendering via JSX; D3 is used as a math library only
      (scales, path generators). Never use d3.select().append() in React components.
    scope: module
    confidence: high
    needs_approval: true
    promotion_targets:
    - CLAUDE.md
  - id: cand-2026-04-10-trace-model-central-contract
    type: fact
    text: ExecutionTrace in src/trace/models.py is the central data contract between
      agent, detection, and visualization subsystems. All three subsystems depend
      on TraceStep, Claim, and ExecutionTrace types.
    subsystem: trace
    confidence: high
    promotion_targets:
    - ARCHITECTURE.md
  - id: cand-2026-04-10-vertical-slice-before-backend
    type: rule
    text: For visualization research prototypes, build a vertical slice with static
      JSON fixtures first to prove the end-to-end experience, then add API/backend.
      Visualization should not be blocked by backend readiness.
    scope: incident-only
    confidence: med
    needs_approval: true
    promotion_targets:
    - CLAUDE.md
  - id: cand-2026-04-10-claim-corrections-override
    type: rule
    text: Hand-labeled claim corrections in assets/data/claim_corrections/ override
      auto-extracted claims when a correction file exists for the trace_id. Use for
      demo traces and evaluation ground truth.
    scope: module
    confidence: high
    needs_approval: true
    promotion_targets:
    - CLAUDE.md
